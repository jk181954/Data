<script>
let allData = [];
let currentView = 'inst';
let instSymbol = 'TX';
let activeR = 3;
let chartInstances = [];

const crosshairPlugin = {
  id: 'crosshairPlugin',
  afterDatasetsDraw(chart) {
    const { ctx, chartArea } = chart;
    if (!chartArea) return;

    const x = chart._hoverX;
    const y = chart._hoverY;

    if (x == null || y == null) return;

    ctx.save();

    if (x >= chartArea.left && x <= chartArea.right) {
      ctx.beginPath();
      ctx.setLineDash([6, 6]);
      ctx.lineWidth = 1;
      ctx.strokeStyle = '#94a3b8';
      ctx.moveTo(x, chartArea.top);
      ctx.lineTo(x, chartArea.bottom);
      ctx.stroke();
    }

    if (y >= chartArea.top && y <= chartArea.bottom) {
      ctx.beginPath();
      ctx.setLineDash([]);
      ctx.lineWidth = 1.2;
      ctx.strokeStyle = '#4f8cff';
      ctx.moveTo(chartArea.left, y);
      ctx.lineTo(chartArea.right, y);
      ctx.stroke();
    }

    ctx.restore();
  }
};

Chart.register(crosshairPlugin);

function showStatus(msg){
  const box = document.getElementById('status');
  document.getElementById('smsg').textContent = msg;
  box.classList.add('show');
}

function hideStatus(){
  document.getElementById('status').classList.remove('show');
}

function parseDateSafe(str){
  if(!str) return null;
  const p = str.split('/');
  if(p.length !== 3) return new Date(str);
  return new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
}

function setCard(idx, label, val, sub, tone=null){
  document.getElementById(`l${idx}`).textContent = label;
  document.getElementById(`v${idx}`).textContent = typeof val === 'number' ? val.toLocaleString() : val;
  document.getElementById(`s${idx}`).textContent = sub || '—';
  document.getElementById(`c${idx}`).className = `card ${tone || 'gray'}`;
  document.getElementById(`v${idx}`).className = `cval ${tone || 'gray'}`;
}

function destroyAllCharts(){
  chartInstances.forEach(ch => { if(ch) ch.destroy(); });
  chartInstances = [];
}

function getRangeText(sliced){
  if(!sliced || !sliced.length) return '--';
  return `${sliced[0].date} → ${sliced[sliced.length - 1].date}`;
}

function getTooltipConfig() {
  return {
    backgroundColor:'#0b1018',
    borderColor:'#1e2d3e',
    borderWidth:1,
    padding:16,
    cornerRadius:10,
    caretSize:8,
    titleColor:'#fff',
    bodyColor:'#fff',
    titleFont:{ size:17, weight:'bold', family:'Noto Sans TC' },
    bodyFont:{ size:16, weight:'bold', family:'Noto Sans TC' },
    displayColors:false
  };
}

function commonChartOptions(customTooltip) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    events: ['mousemove', 'mouseout', 'click', 'touchstart', 'touchmove'],
    onHover(event, activeElements, chart) {
      const e = event?.native || event;
      const area = chart.chartArea;
      if (!e || !area) return;

      const x = e.x;
      const y = e.y;

      if (
        x >= area.left && x <= area.right &&
        y >= area.top && y <= area.bottom
      ) {
        chart._hoverX = x;
        chart._hoverY = y;
      } else {
        chart._hoverX = null;
        chart._hoverY = null;
      }
      chart.draw();
    },
    plugins: {
      legend: { display: false },
      tooltip: customTooltip
    },
    interaction: {
      mode: 'index',
      axis: 'x',
      intersect: false
    },
    scales: {
      x: {
        reverse: false,
        ticks: {
          color: '#94a3b8',
          maxRotation: 45,
          autoSkip: true,
          maxTicksLimit: 12
        },
        grid: {
          color: '#141e2a'
        }
      },
      y: {
        ticks: {
          color: '#94a3b8',
          callback: (v) => Number(v).toLocaleString()
        },
        grid: {
          color: '#141e2a'
        }
      }
    }
  };
}

function chartBoxHTML(id, title, range, legendA, legendB){
  return `
    <div class="chartbox">
      <div class="ctop">
        <div class="ctitle-wrap">
          <span class="ctitle">${title}</span>
          <span class="crange">${range}</span>
        </div>
        <div class="leg">
          <div class="legitem"><div class="legdot" style="background:var(--bull)"></div>${legendA}</div>
          <div class="legitem"><div class="legdot" style="background:var(--bear)"></div>${legendB}</div>
        </div>
      </div>
      <div class="canvas-wrap"><canvas id="canvas-${id}"></canvas></div>
    </div>
  `;
}

function buildNetChart(canvasId, labels, netData){
  const ctx = document.getElementById(canvasId).getContext('2d');
  const chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '淨額',
        data: netData,
        backgroundColor: netData.map(v => v >= 0 ? '#ff4d6d' : '#22c55e'),
        borderRadius: 3,
        barPercentage: 0.72,
        categoryPercentage: 0.8
      }]
    },
    options: commonChartOptions(getTooltipConfig())
  });

  const canvas = chart.canvas;
  canvas.addEventListener('mouseleave', () => {
    chart._hoverX = null;
    chart._hoverY = null;
    chart.draw();
  });

  chartInstances.push(chart);
}

function buildOverlapChart(canvasId, sliced, lk, sk){
  const ctx = document.getElementById(canvasId).getContext('2d');
  const labels = sliced.map(d => d.date);

  const ttConfig = getTooltipConfig();
  ttConfig.filter = (item)=>item.datasetIndex===0;
  ttConfig.callbacks = {
    title:(items)=>labels[items[0].dataIndex],
    label:(ctx)=>{
      const d = ctx.raw.raw;
      return [
        `多方 ${Number(d[lk]||0).toLocaleString()} 口`,
        `空方 ${Number(d[sk]||0).toLocaleString()} 口`
      ];
    }
  };

  const chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: '外層',
          data: sliced.map(d => ({
            x:d.date,
            y:Math.max(d[lk]||0, d[sk]||0),
            raw:d
          })),
          backgroundColor: sliced.map(d => ((d[lk]||0) >= (d[sk]||0) ? '#ff4d6d' : '#22c55e')),
          grouped: false,
          order: 2,
          barPercentage: 0.72,
          categoryPercentage: 0.8,
          borderRadius: 2
        },
        {
          label: '內層',
          data: sliced.map(d => ({
            x:d.date,
            y:Math.min(d[lk]||0, d[sk]||0),
            raw:d
          })),
          backgroundColor: sliced.map(d => ((d[lk]||0) < (d[sk]||0) ? '#ff4d6d' : '#22c55e')),
          grouped: false,
          order: 1,
          barPercentage: 0.42,
          categoryPercentage: 0.8,
          borderRadius: 2
        }
      ]
    },
    options: commonChartOptions(ttConfig)
  });

  const canvas = chart.canvas;
  canvas.addEventListener('mouseleave', () => {
    chart._hoverX = null;
    chart._hoverY = null;
    chart.draw();
  });

  chartInstances.push(chart);
}

function resolveDataSource(){
  if (typeof myData !== 'undefined' && Array.isArray(myData)) return myData;
  if (typeof TAIFEX_DATA !== 'undefined' && Array.isArray(TAIFEX_DATA)) return TAIFEX_DATA;
  if (window.TAIFEX_DATA && Array.isArray(window.TAIFEX_DATA)) return window.TAIFEX_DATA;
  return null;
}

function updateScreen() {
  if (!allData.length) return;

  let parsed = [];
  if (currentView === 'inst') {
    const k = instSymbol === 'TX' ? 'inst_tx' : 'inst_mtx';
    parsed = allData.filter(d => d[k]).map(d => ({
      date: d.date,
      l: d[k].long || 0,
      s: d[k].short || 0,
      n: d[k].net || 0
    }));
  } else if (currentView === 'near') {
    parsed = allData.filter(d => d.near).map(d => ({
      date: d.date,
      top5_l: d.near.top5_l || 0,
      top5_s: d.near.top5_s || 0,
      top5_n: d.near.top5_net || 0,
      top10_l: d.near.top10_l || 0,
      top10_s: d.near.top10_s || 0,
      top10_n: d.near.top10_net || 0
    }));
  } else {
    parsed = allData.filter(d => d.allm).map(d => ({
      date: d.date,
      top5_l: d.allm.top5_l || 0,
      top5_s: d.allm.top5_s || 0,
      top5_n: d.allm.top5_net || 0,
      top10_l: d.allm.top10_l || 0,
      top10_s: d.allm.top10_s || 0,
      top10_n: d.allm.top10_net || 0
    }));
  }

  if (!parsed.length) {
    showStatus('資料來源存在，但解析後為 0 筆，請檢查 taifex_data.js 內容結構');
    return;
  }

  let sliced = parsed;
  if (activeR !== 'all') {
    const cut = new Date();
    cut.setMonth(cut.getMonth() - activeR);
    sliced = parsed.filter(d => {
      const dt = parseDateSafe(d.date);
      return dt && dt >= cut;
    });
  }

  if (!sliced.length) sliced = parsed.slice(0, 250);

  const latest = sliced[0];
  const rangeText = getRangeText(sliced);

  if (currentView === 'inst') {
    setCard(1, '最新淨額', latest.n, latest.date, latest.n >= 0 ? 'bull' : 'bear');
    setCard(2, '多方天數', sliced.filter(x => x.n > 0).length, '所選區間', 'bull');
    setCard(3, '多方口數', latest.l, '口數', 'gray');
    setCard(4, '空方口數', latest.s, '口數', 'gray');
  } else {
    setCard(1, '前五大淨額', latest.top5_n, latest.date, latest.top5_n >= 0 ? 'bull' : 'bear');
    setCard(2, '前十大淨額', latest.top10_n, latest.date, latest.top10_n >= 0 ? 'bull' : 'bear');
    setCard(3, '前五大買方', latest.top5_l, '口數', 'gray');
    setCard(4, '前五大賣方', latest.top5_s, '口數', 'gray');
  }

  const container = document.getElementById('charts-container');
  destroyAllCharts();
  const labels = sliced.map(d => d.date);

  if(currentView === 'inst'){
    container.innerHTML = `
      <div class="chart-grid-2">
        ${chartBoxHTML('inst-net', `外資 ${instSymbol} 多空淨額`, rangeText, '淨多', '淨空')}
        ${chartBoxHTML('inst-ov', `外資 ${instSymbol} 多空未平倉重疊圖`, rangeText, '多方', '空方')}
      </div>
    `;
    buildNetChart('canvas-inst-net', labels, sliced.map(d=>d.n));
    buildOverlapChart('canvas-inst-ov', sliced, 'l', 's');
  } else {
    const lbl = currentView === 'near' ? '近月' : '全月';
    container.innerHTML = `
      <div class="chart-grid-2">
        ${chartBoxHTML('top5-net', `${lbl}前五大淨額`, rangeText, '淨多', '淨空')}
        ${chartBoxHTML('top5-ov', `${lbl}前五大買賣方重疊圖`, rangeText, '買方', '賣方')}
        ${chartBoxHTML('top10-net', `${lbl}前十大淨額`, rangeText, '淨多', '淨空')}
        ${chartBoxHTML('top10-ov', `${lbl}前十大買賣方重疊圖`, rangeText, '買方', '賣方')}
      </div>
    `;
    buildNetChart('canvas-top5-net', labels, sliced.map(d=>d.top5_n));
    buildOverlapChart('canvas-top5-ov', sliced, 'top5_l', 'top5_s');
    buildNetChart('canvas-top10-net', labels, sliced.map(d=>d.top10_n));
    buildOverlapChart('canvas-top10-ov', sliced, 'top10_l', 'top10_s');
  }

  hideStatus();
}

function switchMainView(view) {
  currentView = view;
  document.querySelectorAll('#main-view-switcher .s-tab').forEach(b => b.classList.toggle('on', b.dataset.view === view));
  document.getElementById('inst-sub-tabs').style.display = view === 'inst' ? 'block' : 'none';
  updateScreen();
}

function switchInstSymbol(sym) {
  instSymbol = sym;
  document.getElementById('btn-sym-tx').classList.toggle('on', sym === 'TX');
  document.getElementById('btn-sym-mtx').classList.toggle('on', sym === 'MTX');
  updateScreen();
}

function setR(m, el) {
  activeR = m;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  updateScreen();
}

window.onload = function() {
  const source = resolveDataSource();
  if (!source) {
    showStatus('已載入 taifex_data.js，但找不到資料變數。請確認 taifex_data.js 裡是 window.TAIFEX_DATA = [...]');
    return;
  }

  allData = source.slice();
  updateScreen();
};
</script>
