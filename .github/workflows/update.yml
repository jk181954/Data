name: "Daily Taifex Update"
on:
  schedule:
    - cron: "40 8 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - env:
          PYTHONUNBUFFERED: "1"
        run: python update_taifex.py
      - run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add taifex_data.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update taifex_data.js" && git push)
