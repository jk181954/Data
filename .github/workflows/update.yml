name: 更新 TAIFEX 資料

on:
  schedule:
    - cron: "30 6 * * 1-5"
    - cron: "30 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install requests
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run update_taifex.py
        run: |
          python update_taifex.py

      - name: Check generated file
        run: |
          ls -lh
          echo "----- taifex_data.js -----"
          head -n 5 taifex_data.js || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add taifex_data.js

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update taifex data"
            git push
          fi
