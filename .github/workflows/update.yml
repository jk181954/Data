name: Daily Taifex Update

on:
  schedule:
    # 避開整點與半點尖峰，改成 UTC 08:35 (台灣 16:35) 與 UTC 11:35 (台灣 19:35)
    - cron: "35 8 * * 1-5"   
    - cron: "35 11 * * 1-5"  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run updater
        env:
          PYTHONUNBUFFERED: "1"
        run: python update_taifex.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add taifex_data.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update taifex_data.js" && git push)
